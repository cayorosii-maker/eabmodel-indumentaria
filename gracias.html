<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EABMODEL | Compra Exitosa</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main class="container my-5 flex-grow-1 d-flex flex-column justify-content-center align-items-center text-center">

        <i class="bi bi-bag-check-fill text-success icono-ok"></i>

        <h1 class="mt-3 fw-bold">
            ¡Gracias por tu compra!
        </h1>

        <p class="fs-5 text-muted mb-4">
            Tu pedido ha sido procesado con éxito.
            Nos pondremos en contacto contigo pronto
            para coordinar el envío.
        </p>

        <div class="card shadow-sm p-4 mb-4 border-0 resumen">

            <h5 class="mb-3">
                Resumen de la compra
            </h5>

            <div class="d-flex justify-content-between border-bottom pb-2 mb-2">
                <span>Total pagado:</span>

                <span
                    class="fw-bold text-success"
                    id="total-compra">

                    $0
                </span>
            </div>

            <p class="small text-muted mb-0">
                Gracias por elegir EABMODEL.
                Esperamos verte nuevamente.
            </p>

        </div>

        <a
            href="index.html"
            class="btn btn-primary btn-lg">

            <i class="bi bi-house-door me-2"></i>
            Volver al Inicio

        </a>

    </main>

    <script>
        const total = localStorage.getItem('totalCompra');

        if (total) {
            document.getElementById('total-compra').textContent =
                '$' + Number(total).toLocaleString('es-AR');
        }

        // Vaciar carrito después de la compra
        localStorage.removeItem('carrito');
        localStorage.removeItem('totalCompra');
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
