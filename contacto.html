<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Contacto - Turismo en Salta</title>
        <!-- Bootstrap CSS -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
        <style>
            .form-container {
                max-width: 600px;
                margin: 50px auto;
                padding: 30px;
                background-color: #fff;
                border-radius: 10px;
                box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            }
            body {
                background-color: #f4f7f6;
            }
            footer {
                background-color: #212529;
                color: white;
                padding: 40px 0;
                margin-top: 50px;
            }
        </style>
    </head>
    <body>
        <!-- Navegación -->
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
            <div class="container">
                <a class="navbar-brand fw-bold" href="index.html"
                    >SALTA TURISMO</a
                >
                <button
                    class="navbar-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#navbarNav"
                >
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a class="nav-link" href="index.html">Inicio</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="info.html">Información</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" href="contacto.html"
                                >Contacto</a
                            >
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <main class="container">
            <div class="form-container">
                <h2 class="text-center mb-4">Contactanos</h2>
                <p class="text-center text-muted mb-4">
                    Envianos tu consulta y te responderemos a la brevedad.
                </p>

                <form action="#" method="POST">
                    <div class="mb-3">
                        <label for="nombre" class="form-label"
                            >Nombre Completo</label
                        >
                        <input
                            type="text"
                            class="form-control"
                            id="nombre"
                            name="nombre"
                            placeholder="Tu nombre..."
                            required
                        />
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label"
                            >Correo Electrónico</label
                        >
                        <input
                            type="email"
                            class="form-control"
                            id="email"
                            name="email"
                            placeholder="nombre@ejemplo.com"
                            required
                        />
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="motivo" class="form-label"
                                >Motivo de consulta</label
                            >
                            <select
                                class="form-select"
                                id="motivo"
                                name="motivo"
                            >
                                <option value="consulta" selected>
                                    Consulta General
                                </option>
                                <option value="turismo">
                                    Paquetes Turísticos
                                </option>
                                <option value="otro">Otro</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label d-block"
                                >Tipo de visita</label
                            >
                            <div class="form-check form-check-inline mt-2">
                                <input
                                    class="form-check-input"
                                    type="radio"
                                    name="visita"
                                    id="individual"
                                    value="individual"
                                    checked
                                />
                                <label class="form-check-label" for="individual"
                                    >Individual</label
                                >
                            </div>
                            <div class="form-check form-check-inline">
                                <input
                                    class="form-check-input"
                                    type="radio"
                                    name="visita"
                                    id="grupo"
                                    value="grupo"
                                />
                                <label class="form-check-label" for="grupo"
                                    >Grupo</label
                                >
                            </div>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="mensaje" class="form-label">Mensaje</label>
                        <textarea
                            class="form-control"
                            id="mensaje"
                            name="mensaje"
                            rows="4"
                            placeholder="Escribe tu mensaje aquí..."
                        ></textarea>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg">
                            Enviar Mensaje
                        </button>
                        <button type="reset" class="btn btn-outline-secondary">
                            Limpiar Formulario
                        </button>
                    </div>
                </form>
            </div>
        </main>

        <footer class="text-center">
            <div class="container">
                <p class="mb-2">© 2024 Turismo en Salta - TP HTML</p>
                <p class="small text-secondary">
                    Desarrollado para el curso de Programación
                </p>
            </div>
        </footer>
    </body>
</html>
