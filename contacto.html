<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacto - EAB Indumentaria</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Barra de navegación -->
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container">
                <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
                    <img src="Imagenes/Logo_EABMODEL.jpeg" alt="Logo EABMODEL" class="navbar-logo">
                    <span class="marca-texto">EABMODEL</span>
                </a>
                
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarTogglerDemo01" aria-controls="navbarTogglerDemo01" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                
                <div class="collapse navbar-collapse" id="navbarTogglerDemo01">
                    <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle text-uppercase" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                                Productos
                            </a>
                            <ul class="dropdown-menu dropdown-menu-dark">
                                <li><a class="dropdown-item" href="#">Pantalones</a></li>
                                <li><a class="dropdown-item" href="#">Remeras</a></li>
                                <li><a class="dropdown-item" href="#">Buzos</a></li>
                            </ul>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-uppercase" href="#">Contactos</a>
                        </li>
                    </ul>
                    
                    <form class="d-flex" role="search">
                        <div class="input-group input-busqueda">
                            <input class="form-control" type="search" placeholder="¿Qué estás buscando?" aria-label="Buscar">
                            <button class="btn btn-outline-light" type="submit">Buscar</button>
                        </div>
                    </form>
                </div>
            </div>
        </nav>

  <!-- Contenido principal -->
  <div class="container mt-5">
    <h2 class="text-center mb-4">MIS PEDIDOS</h2>
    <p class="text-center">Completa el formulario para realizar un pedido o comunicarte con el vendedor.</p>
    
    <form>
      <div class="mb-3">
        <label for="nombre" class="form-label">Nombre completo</label>
        <input type="text" class="form-control" id="nombre" placeholder="Tu nombre">
      </div>
      <div class="mb-3">
        <label for="email" class="form-label">Correo electrónico</label>
        <input type="email" class="form-control" id="email" placeholder="ejemplo@correo.com">
      </div>
      <div class="mb-3">
        <label for="telefono" class="form-label">Teléfono</label>
        <input type="tel" class="form-control" id="telefono" placeholder="Número de contacto">
      </div>
      <div class="mb-3">
        <label for="pedido" class="form-label">Detalle del pedido</label>
        <textarea class="form-control" id="pedido" rows="4" placeholder="Indica la prenda, cantidad, talle, color..."></textarea>
      </div>
      <button type="submit" class="btn btn-primary">Enviar Pedido</button>
    </form>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
